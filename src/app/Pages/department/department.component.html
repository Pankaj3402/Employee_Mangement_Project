<div class="dept-container">

  <!-- FORM CARD -->
  <div class="dept-card">
    <h3>{{ isEditMode ? 'Update Department' : 'Add Department' }}</h3>

    <div class="dept-form">

      <!-- Name -->
      <div class="form-group">
        <label>Department Name</label>
        <input type="text"
               [(ngModel)]="newDeptObj.departmentName"
               placeholder="Enter department name" />
      </div>

      <!-- Active -->
      <div class="form-group checkbox">
        <input type="checkbox"
               [(ngModel)]="newDeptObj.isActive"
               id="active" />
        <label for="active">Is Active</label>
      </div>

      <!-- Buttons -->
      <div class="form-actions">
        <button class="btn save" (click)="onSaveDept()">
          {{ isEditMode ? 'Update' : 'Save' }}
        </button>

        <button class="btn reset" (click)="resetForm()">
          Reset
        </button>
      </div>

    </div>
  </div>

  <!-- TABLE CARD -->
  <div class="dept-card">
    <h3>Department List</h3>

    <table class="dept-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let d of deptList; let i = index">
          <td>{{ i + 1 }}</td>
          <td>{{ d.departmentName }}</td>

          <td>
            <span class="badge active" *ngIf="d.isActive">Active</span>
            <span class="badge inactive" *ngIf="!d.isActive">Inactive</span>
          </td>

          <td>
            <button class="btn edit" (click)="onEdit(d)">Edit</button>
            <button class="btn delete" (click)="onDelete(d.departmentId)">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>

    <div *ngIf="deptList.length === 0" class="empty">
      No departments found
    </div>

  </div>

</div>
