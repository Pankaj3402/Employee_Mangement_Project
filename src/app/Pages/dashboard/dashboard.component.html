<div class="dashboard-bg">

  <div class="dashboard-header">
    <h1 class="dashboard-title">Welcome to Employee Dashboard</h1>
    <p class="dashboard-subtitle">Overview & quick stats</p>
  </div>

  <div class="dashboard-cards">

    <!-- Departments -->
    <div class="dashboard-card"
         (click)="goToDepartment()">
      <div class="card-icon card-blue">🏢</div>
      <div class="card-info">
        <h2>Departments</h2>
        <p>{{deptCount}} Total</p>
      </div>
    </div>

    <!-- Employees -->
    <div class="dashboard-card"
         (click)="goToEmployee()">
      <div class="card-icon card-green">👨‍💼</div>
      <div class="card-info">
        <h2>Employees</h2>
        <p>{{empCount}} Total</p>
      </div>
    </div>

    <!-- Designations -->
    <div class="dashboard-card"
         (click)="goToDesignation()">
      <div class="card-icon card-yellow">📄</div>
      <div class="card-info">
        <h2>Designations</h2>
        <p>{{desigCount}} Total</p>
      </div>
    </div>

  </div>

</div>
